<!DOCTYPE html>
<html>
<body>

<h2>Prime Number Check</h2>

<input type="number" id="num" placeholder="Enter number">
<button onclick="checkPrime()">Check</button>

<p id="result"></p>

<script>
  function checkPrime() {
    let n = document.getElementById("num").value;
    let flag = true;

    if (n <= 1) {
      flag = false;
    }

    for (let i = 2; i < n; i++) {
      if (n % i === 0) {
        flag = false;
        break;
      }
    }

    if (flag)
      document.getElementById("result").innerHTML = "Prime Number";
    else
      document.getElementById("result").innerHTML = "Not a Prime Number";
  }
</script>

</body>
</html>

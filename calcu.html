<!DOCTYPE html>
<html>
<head>
  <title>Node Calculator</title>
</head>
<body>

  <h2>Calculator</h2>

  <form action="/calc" method="GET">
    <input type="number" name="a" placeholder="First number" required>
    <input type="number" name="b" placeholder="Second number" required>
    <br><br>

    <button name="op" value="add">+</button>
    <button name="op" value="sub">-</button>
    <button name="op" value="mul">*</button>
    <button name="op" value="div">/</button>
  </form>

</body>
</html>
